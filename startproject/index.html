<meta name="author" content="Vision Coded Studio">

<!-- Open Graph (social sharing preview) -->

<meta property="og:title" content="Start a Project | Vision Coded Studio">
<meta property="og:description" content="Tell Vision Coded Studio about your business and the website you want to build. Start your digital project today.">

<meta property="og:url" content="https://visioncodedstudio.com/startproject">

<body>

<!-- NAV -->

<nav class="nav">

<a href="/">Home</a>
<a href="/about/">About</a>
<a href="/services/">Services</a>
<a href="/portfolio/">Portfolio</a>
<a href="/startproject/">Start Project</a>
<a href="/contact/">Contact</a>

</nav>

<header>

<h1>Start Your Project</h1>

<div class="underline"></div>

<p>
Tell us about your business and the website you want to build.  
This helps Vision Coded Studio understand your project before we begin.
</p>

</header>


<!-- PROJECT FORM -->

<section class="contact-container">

<form class="contact-form">

<input type="text" name="name" placeholder="Your Name *" required>

<input type="email" name="email" placeholder="Email Address *" required>

<input type="tel" name="phone" placeholder="Phone Number *" required>

<input type="text" name="business" placeholder="Business Name">

<select name="website-type">
<option value="">What type of website do you need?</option>
<option>Business Website</option>
<option>Landing Page</option>
<option>E-commerce Store</option>
<option>Portfolio Website</option>
<option>Not sure yet</option>
</select>

<select name="pages">
<option value="">How many pages do you need?</option>
<option>1 Page</option>
<option>3–5 Pages</option>
<option>5–8 Pages</option>
<option>Not sure yet</option>
</select>

<select name="branding">
<option value="">Do you already have branding?</option>
<option>Yes (logo + colors)</option>
<option>Logo only</option>
<option>No branding yet</option>
</select>

<input type="text" name="domain" placeholder="Do you already own a domain name?">

<select name="hosting">
<option value="">Do you have hosting?</option>
<option>Yes</option>
<option>No</option>
<option>Not sure</option>
</select>

<textarea name="project-details" placeholder="Tell us more about your project *" required></textarea>

<button class="btn btn-primary">
Start My Project
<span>→</span>
</button>

</form>

</section>


<footer class="footer">

<p>© 2025 Vision Coded Studio — All Rights Reserved.</p>

</footer>

</body>
</html>
