<header>

<h1>Start Your Project</h1>

<div class="underline"></div>

<p>
Tell us about your business and the website you want to build.  
This helps Vision Coded Studio understand your project before we begin.
</p>

</header>


<!-- PROJECT FORM -->

<section class="contact-container">

<form class="contact-form">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Business Name">

<select>
<option value="">What type of website do you need?</option>
<option>Business Website</option>
<option>Landing Page</option>
<option>E-commerce Store</option>
<option>Portfolio Website</option>
<option>Not sure yet</option>
</select>

<select>
<option value="">How many pages do you need?</option>
<option>1 Page</option>
<option>3-5 Pages</option>
<option>5-8 Pages</option>
<option>Not sure yet</option>
</select>

<select>
<option value="">Do you already have branding?</option>
<option>Yes (logo + colors)</option>
<option>Logo only</option>
<option>No branding yet</option>
</select>

<input type="text" placeholder="Do you already own a domain name?">

<select>
<option value="">Do you have hosting?</option>
<option>Yes</option>
<option>No</option>
<option>Not sure</option>
</select>

<textarea placeholder="Tell us more about your project"></textarea>

<button class="btn btn-primary">
Start My Project
<span>→</span>
</button>

</form>

</section>


<footer class="footer">

<p>© 2025 Vision Coded Studio — All Rights Reserved.</p>

</footer>


</body>
