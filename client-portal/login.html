<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Login | Vision Coded Studio</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS (FIXED FOR GITHUB PAGES) -->
<link rel="stylesheet" href="/Vision-Coded-Studio/css/auth.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="header">
        <img src="/Vision-Coded-Studio/assets/logos/vcs-logo-horizontal.png" class="logo">

        <p class="portal">
            <i class="fa-solid fa-user"></i>
            CLIENT PORTAL
        </p>

        <p class="sub">Secure Client Access</p>
    </div>

    <!-- LOGIN FORM -->
    <form class="login-box" onsubmit="handleLogin(event)">

        <h2>Welcome Back</h2>
        <p class="muted">Sign in to your dashboard</p>

        <label>Email</label>
        <div class="input">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="email" placeholder="Enter email" required>
        </div>

        <label>Password</label>
        <div class="input">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="row">
            <label>
                <input type="checkbox">
                Remember me
            </label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="divider"></div>

        <div class="auth-footer">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Client access only</span>
        </div>

        <p class="auth-note">All activity is monitored for security</p>

    </form>

    <!-- FOOTER -->
    <div class="footer">
        © 2026 Vision Coded Studio. All rights reserved.
    </div>

</div>

<!-- LOGIN SCRIPT -->
<script>
function handleLogin(e){
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password){
        alert("Enter credentials");
        return;
    }

    localStorage.setItem("clientAuth", "true");
    localStorage.setItem("clientEmail", email);

    window.location.href = "/Vision-Coded-Studio/client-portal/index.html";
}
</script>

</body>
</html>
