<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Login | Vision Coded Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="header">
        <img src="../assets/logos/vcs-logo-horizontal.png" class="logo">

        <p class="portal">
            <i class="fa-solid fa-user"></i>
            CLIENT PORTAL
        </p>

        <p class="sub">Secure Client Access</p>
    </div>

    <!-- LOGIN FORM -->
    <form class="login-box" onsubmit="handleLogin(event)">

        <h2>Welcome Back</h2>
        <p class="muted">Sign in to your dashboard</p>

        <label>Email</label>
        <div class="input">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="email" placeholder="Enter email" required>
        </div>

        <label>Password</label>
        <div class="input">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="row">
            <label>
                <input type="checkbox">
                Remember me
            </label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Login</button>

        <div class="divider"></div>

        <div class="auth-footer">
            <i class="fa-solid fa-shield-halved"></i>
            <span>Client access only</span>
        </div>

        <p class="auth-note">All activity is monitored for security</p>

    </form>

    <!-- FOOTER -->
    <div class="footer">
        &copy; 2026 Vision Coded Studio. All rights reserved.
    </div>

</div>

<script>
function handleLogin(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    // TEMP LOGIN LOGIC (no backend yet)
    if(email && password){
        localStorage.setItem("clientLoggedIn", "true");
        window.location.href = "/client-portal/dashboard/index.html";
    } else {
        alert("Enter credentials");
    }
}
</script>

</body>
</html>
