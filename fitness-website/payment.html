<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Iron Pulse Fitness</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Iron Pulse Fitness</h1>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="programs.html">Programs</a>
<a href="trainers.html">Trainers</a>
<a href="shop.html">Shop</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="checkout-container">

<h2>Payment</h2>

<div class="checkout-grid">


<!-- PAYMENT FORM -->

<div class="checkout-form">

<h3>Card Information</h3>

<form id="payment-form" action="order-success.html">

<input id="card-name" type="text" placeholder="Cardholder Name" required>

<input id="card-number" type="text" placeholder="Card Number" maxlength="19" required>

<div class="card-row">

<input id="card-exp" type="text" placeholder="MM/YY" maxlength="5" required>

<input id="card-cvv" type="text" placeholder="CVC" maxlength="4" required>

</div>

<button type="submit" class="checkout-btn">
Complete Order
</button>

</form>

<a href="checkout.html" class="back-btn">← Back to Checkout</a>

</div>



<!-- ORDER SUMMARY -->

<div class="order-summary">

<h3>Order Summary</h3>

<div id="payment-items"></div>

<p class="checkout-total">
Total: <span id="payment-total">$0</span>
</p>

</div>


</div>

</section>


<script>


/* ===============================
LOAD CART FROM LOCAL STORAGE
=============================== */

const cart = JSON.parse(localStorage.getItem("cart")) || [];

const itemsContainer = document.getElementById("payment-items");
const totalDisplay = document.getElementById("payment-total");

let total = 0;

cart.forEach(item => {

const itemDiv = document.createElement("div");

itemDiv.classList.add("cart-item");

itemDiv.innerHTML = `
<div class="cart-product">
<img src="${item.image}" width="50">
<span>${item.name} x${item.quantity}</span>
</div>
<span>$${(item.price * item.quantity).toFixed(2)}</span>
`;

itemsContainer.appendChild(itemDiv);

total += item.price * item.quantity;

});

totalDisplay.innerText = "$" + total.toFixed(2);



/* ===============================
CARD INPUT FORMAT
=============================== */

const cardNumber = document.getElementById("card-number");
const expInput = document.getElementById("card-exp");
const cvvInput = document.getElementById("card-cvv");


cardNumber.addEventListener("input", function(e){

let value = e.target.value.replace(/\D/g,"").substring(0,16);

let formatted = value.match(/.{1,4}/g);

e.target.value = formatted ? formatted.join(" ") : "";

});


expInput.addEventListener("input", function(e){

let value = e.target.value.replace(/\D/g,"").substring(0,4);

if(value.length >= 3){
value = value.substring(0,2) + "/" + value.substring(2);
}

e.target.value = value;

});


cvvInput.addEventListener("input", function(e){
e.target.value = e.target.value.replace(/\D/g,"");
});


/* ===============================
LUHN CARD VALIDATION
=============================== */

function validCard(number){

number = number.replace(/\s/g,"");

let sum = 0;
let shouldDouble = false;

for(let i = number.length - 1; i >= 0; i--){

let digit = parseInt(number.charAt(i));

if(shouldDouble){

digit *= 2;

if(digit > 9) digit -= 9;

}

sum += digit;

shouldDouble = !shouldDouble;

}

return sum % 10 === 0;

}


document.getElementById("payment-form").addEventListener("submit", function(e){

const cardVal = cardNumber.value;

if(!validCard(cardVal)){

alert("Invalid credit card number");

e.preventDefault();

}

});


</script>

</body>
</html>
