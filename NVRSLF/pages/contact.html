<main class="contact-center">

  <div class="page-center">
    <h2>Early Access & Product Inquiry</h2>
    <p>Request early access or ask about upcoming NVRSLF releases.</p>

    <form action="#" method="post">

      <!-- Text -->
      <input type="text" name="fullname" placeholder="Full Name" required><br><br>

      <!-- Email -->
      <input type="email" name="email" placeholder="Email Address" required><br><br>

      <!-- Select (Product Type) -->
      <label>Select Product:</label><br>
      <select name="product">
        <option value="keyboard">Mechanical Keyboard</option>
        <option value="dock">Charging Dock</option>
        <option value="deskmat">Performance Desk Mat</option>
        <option value="custom">Custom Setup</option>
      </select><br><br>

      <!-- Radio (Use Case) -->
      <label>Primary Use:</label><br>
      <input type="radio" name="use" value="gaming"> Gaming
      <input type="radio" name="use" value="work"> Work
      <input type="radio" name="use" value="content"> Content Creation<br><br>

      <!-- Checkbox -->
      <input type="checkbox" name="updates">
      Join early access updates<br><br>

      <!-- Date -->
      <label>Desired Purchase Timeline:</label><br>
      <input type="date" name="timeline"><br><br>

      <!-- Textarea -->
      <textarea name="message" rows="4" placeholder="Tell us about your setup goals..."></textarea><br><br>

      <!-- Submit -->
      <input type="submit" value="Request Access">

    </form>
  </div>

</main>
